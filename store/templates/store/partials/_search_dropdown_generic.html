{% load currency %}
<div class="list-group list-group-flush">
  {% for item in items %}
  <a href="{{ item.url }}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-start">
    <div class="d-flex align-items-center">
      {% if item.image %}
      <img src="{{ item.image }}" alt="" class="me-2 rounded" loading="lazy" decoding="async" style="width:32px; height:32px; object-fit:cover;">
      {% else %}
      <div class="me-2 rounded bg-secondary" style="width:32px; height:32px;"></div>
      {% endif %}
      <div>
        <div class="fw-semibold">{{ item.name }}</div>
        <div class="small text-muted">{{ item.category }} - {{ item.type }}</div>
      </div>
    </div>
    {% if item.price %}
    <div class="text-end" style="min-width:80px;">
      <div class="fw-semibold">{{ item.price|rupees }}</div>
    </div>
    {% endif %}
  </a>
  {% empty %}
  <div class="list-group-item">No results</div>
  {% endfor %}
</div>
